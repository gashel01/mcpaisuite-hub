worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Enable HTTP/2 — multiplexes all requests over a single TCP connection.
    # Eliminates the browser's 6-connection-per-origin limit that causes
    # tab hanging when multiple pages are open.

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server api:8000;
    }

    server {
        listen 3007 http2;

        # ── API routes → backend ─────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
        }

        # SSE endpoints → backend (needs special proxy settings)
        location /audit/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;  # 24h — SSE is long-lived
            chunked_transfer_encoding off;
        }

        # All backend API endpoints
        location ~ ^/(chat|tasks|conversations|stats|metrics|analytics|alerts|review|regression|host|egress|mode|workspace|audit|constitution|eval|marketplace|agents) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # Health check
        location /health {
            proxy_pass http://backend;
        }

        # ── Everything else → frontend ───────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
